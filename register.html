    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Registration Page</title>

</head>
<body>
    <div id="wholepage">
        <header>
                <h2>Contact Form</h2>
                <h4>Please fill in your information and we will be sending your order in no time</h4>
        </header>
    <div>
        <form method="post">
            <label for="fname">Your Name</label> 
                <input type="text" name="firstname" placeholder="First Name"> &nbsp;
                <input type="text" name="lastname" placeholder="LastName"> <br> <br>
            <label for="email">Your Email</label> 
                <input type="email" placeholder="eg balkissyetunde@gmail.com"> <br> <br>
            <label for="phone">Phone*</label> <input type="number" name="phonenumber" placeholder="081" required> &nbsp;
                <input type="number" name="phonenumber" placeholder="3687" required> &nbsp;
                <input type="number" name="phonenumber" placeholder="2530" required><br><br>
            <label for="msgsbjt">Message Subject*</label> 
                <input type="text" name="messagesubject" placeholder="Other" required><br><br>
            <label for="message">Message*</label> 
            <!-- <textarea name="Messagebox" id="messagebox" cols="40" rows="3"></textarea><br><br> -->
                <input type="text" name="message" required id="messagebox"><br><br>
            <label for="verify">Verification*</label> 
                <input type="text"><br><br><hr>
            <input type="submit" value="SUBMIT FORM"> &nbsp;
            <input type="reset" value="RESET">
        </form>
    </div>
